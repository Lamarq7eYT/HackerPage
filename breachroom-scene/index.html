/* ── TEXT MODE ── */
function openTextMode() {
  showScreen('text-screen');
  document.getElementById('text-case-title').textContent = activeInc.company.toUpperCase();
  // Build text content
  const body = document.getElementById('text-body');
  body.innerHTML = '';
  body.scrollTop = 0;
  activeInc.scenes.forEach((sc, i) => {
    const block = document.createElement('div');
    block.className = 'text-scene-block';
    block.dataset.idx = i;
    block.innerHTML = `<div class="text-scene-num">CENA ${String(i+1).padStart(2,'0')}</div>
      <div class="text-scene-title">${sc.title}</div>
      <div class="text-scene-content">${sc.text.replace(/\n/g,'<br><br>')}</div>
      <div class="text-scene-lesson">🛡 ${sc.narr}</div>`;
    body.appendChild(block);
  });
  // Init 3D
  if (!textStick) textStick = new StickScene(document.getElementById('text-3d-canvas'));
  textStick.setupScene(activeInc.scenes[0], activeInc.accent);
  textStick.start();
  // Scroll handler for fade + scene sync
  body.onscroll = () => {
    const blocks = body.querySelectorAll('.text-scene-block');
    const bodyRect = body.getBoundingClientRect();
    let currentIdx = 0;
    blocks.forEach((b, i) => {
      const r = b.getBoundingClientRect();
      const relTop = r.top - bodyRect.top;
      // Fade blocks that are scrolled past
      if (relTop < -r.height * 0.3) { b.classList.add('faded'); }
      else { b.classList.remove('faded'); }
      // Determine current visible scene
      if (relTop < bodyRect.height * 0.5 && relTop > -r.height * 0.5) currentIdx = i;
    });
    // Update 3D scene based on scroll position
    if (activeInc && activeInc.scenes[currentIdx]) {
      textStick.setupScene(activeInc.scenes[currentIdx], activeInc.accent);
    }
  };
}

document.getElementById('text-back').onclick = (e) => { e.stopPropagation(); if (textStick) textStick.stop(); showScreen('mode-screen'); };

/* ── AUDIO MODE ── */
let audioSceneIdx = 0;
let isPlaying = false;
let wordTimers = [];

function openAudioMode() {
  showScreen('audio-screen');
  document.getElementById('audio-case-title').textContent = activeInc.company.toUpperCase();
  audioSceneIdx = 0;
  if (!audioStick) audioStick = new StickScene(document.getElementById('audio-3d-canvas'));
  loadAudioScene();
}

function loadAudioScene() {
  if (!activeInc) return;
  const sc = activeInc.scenes[audioSceneIdx];
  audioStick.setupScene(sc, activeInc.accent);
  audioStick.start();
  // Clear subs
  const subsEl = document.getElementById('audio-subs');
  subsEl.innerHTML = '';
  document.getElementById('audio-progress-fill').style.width = `${((audioSceneIdx + 1) / activeInc.scenes.length) * 100}%`;
  document.getElementById('audio-play').textContent = '▶ PLAY';
  isPlaying = false;
}

function playAudioScene() {
  if (!activeInc || isPlaying) return;
  isPlaying = true;
  document.getElementById('audio-play').textContent = '⏸ PAUSE';
  const sc = activeInc.scenes[audioSceneIdx];
  const text = sc.narr;
  const subsEl = document.getElementById('audio-subs');
  subsEl.innerHTML = '';

  // Cancel any previous timers
  wordTimers.forEach(t => clearTimeout(t));
  wordTimers = [];

  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'pt-BR';
    utt.rate = 0.85;
    utt.pitch = 0.9;

    // Word-level subtitle sync
    const words = text.split(/\s+/);
    let wordIdx = 0;
    const avgWordDuration = (text.length * 55) / words.length; // rough ms per word

    // Create word spans
    const spans = words.map(w => {
      const span = document.createElement('span');
      span.className = 'sub-word';
      span.textContent = w;
      subsEl.appendChild(span);
      return span;
    });

    // Reveal words progressively
    function revealWord(idx) {
      if (idx >= spans.length) return;
      spans[idx].classList.add('visible');
      // Check if subs area is overflowing — fade old words
      const subsRect = subsEl.getBoundingClientRect();
      spans.forEach((s, i) => {
        if (i < idx - 8 && !s.classList.contains('fading')) {
          s.classList.add('fading');
        }
      });
    }

    utt.onboundary = (event) => {
      if (event.name === 'word' && wordIdx < spans.length) {
        revealWord(wordIdx);
        wordIdx++;
      }
    };

    // Fallback timer-based reveal if onboundary not supported
    let fallbackStarted = false;
    utt.onstart = () => {
      // Start fallback after small delay to check if onboundary fires
      setTimeout(() => {
        if (wordIdx === 0) {
          fallbackStarted = true;
          words.forEach((_, i) => {
            const timer = setTimeout(() => revealWord(i), i * avgWordDuration);
            wordTimers.push(timer);
          });
        }
      }, 300);
    };

    utt.onend = () => {
      // Reveal any remaining
      spans.forEach(s => s.classList.add('visible'));
      isPlaying = false;
      document.getElementById('audio-play').textContent = '▶ PLAY';
      // Auto advance after pause
      setTimeout(() => {
        if (audioSceneIdx < activeInc.scenes.length - 1) {
          audioSceneIdx++;
          loadAudioScene();
          setTimeout(() => playAudioScene(), 600);
        }
      }, 1500);
    };

    speechSynthesis.speak(utt);
  }
}

function pauseAudio() {
  if ('speechSynthesis' in window) {
    if (speechSynthesis.speaking && !speechSynthesis.paused) {
      speechSynthesis.pause();
      document.getElementById('audio-play').textContent = '▶ PLAY';
    } else if (speechSynthesis.paused) {
      speechSynthesis.resume();
      document.getElementById('audio-play').textContent = '⏸ PAUSE';
    }
  }
}

document.getElementById('audio-play').onclick = (e) => {
  e.stopPropagation();
  if (!isPlaying) playAudioScene();
  else pauseAudio();
};
document.getElementById('audio-skip').onclick = (e) => {
  e.stopPropagation();
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  wordTimers.forEach(t => clearTimeout(t)); wordTimers = [];
  isPlaying = false;
  if (activeInc && audioSceneIdx < activeInc.scenes.length - 1) { audioSceneIdx++; loadAudioScene(); }
  else { closeAllPlayers(); showScreen('menu-screen'); }
};
document.getElementById('audio-back').onclick = (e) => {
  e.stopPropagation();
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  wordTimers.forEach(t => clearTimeout(t)); wordTimers = [];
  isPlaying = false;
  if (audioStick) audioStick.stop();
  showScreen('mode-screen');
};

function closeAllPlayers() {
  if (textStick) textStick.stop();
  if (audioStick) audioStick.stop();
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  wordTimers.forEach(t => clearTimeout(t)); wordTimers = [];
  isPlaying = false;
  activeInc = null;
}

const bz=new THREE.Mesh(new THREE.BoxGeometry(4.35,3.02,.12),M.bz);bz.position.z=.17;mGrp.add(bz);
const gls=new THREE.Mesh(new THREE.PlaneGeometry(3.9,2.55),M.gl);gls.position.z=.24;mGrp.add(gls);
const emP=new THREE.Mesh(new THREE.PlaneGeometry(3.7,2.4),scrMat);emP.position.z=.235;mGrp.add(emP);
addAt(S, new THREE.Mesh(new THREE.BoxGeometry(.22,1.2,.22),M.st), 0,-2,0);
addAt(S, new THREE.Mesh(new THREE.BoxGeometry(1.2,.06,.8),M.st), 0,-2.6,.2);
const kM=new THREE.MeshStandardMaterial({color:'#151A26',roughness:.6,metalness:.4});
const kb=new THREE.Mesh(new THREE.BoxGeometry(1.6,.06,.5),kM);kb.position.set(0,-1.5,1.5);kb.rotation.x=-.08;S.add(kb);
addAt(S, new THREE.Mesh(new THREE.BoxGeometry(.3,.08,.45),kM), 1.4,-1.5,1.5);

// Particles
const DC=200,dG=new THREE.BufferGeometry(),dP=new Float32Array(DC*3),dV=new Float32Array(DC*3),dSz=new Float32Array(DC);
for(let i=0;i<DC;i++){dP[i*3]=(Math.random()-.5)*16;dP[i*3+1]=(Math.random()-.5)*8;dP[i*3+2]=(Math.random()-.5)*12;dV[i*3]=(Math.random()-.5)*.002;dV[i*3+1]=Math.random()*.003+.001;dV[i*3+2]=(Math.random()-.5)*.002;dSz[i]=Math.random()*3+1}
dG.setAttribute('position',new THREE.BufferAttribute(dP,3));dG.setAttribute('size',new THREE.BufferAttribute(dSz,1));
const duM=new THREE.ShaderMaterial({uniforms:{uC:{value:new THREE.Color('#58F2FF')},uO:{value:.3},uPR:{value:R.getPixelRatio()}},vertexShader:`attribute float size;uniform float uPR;void main(){vec4 m=modelViewMatrix*vec4(position,1.);gl_PointSize=size*uPR*(80./-m.z);gl_Position=projectionMatrix*m;}`,fragmentShader:`uniform vec3 uC;uniform float uO;void main(){float d=length(gl_PointCoord-.5);if(d>.5)discard;gl_FragColor=vec4(uC,smoothstep(.5,.1,d)*uO);}`,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
S.add(new THREE.Points(dG,duM));

// Lights
S.add(new THREE.AmbientLight('#1a2030',0.8));
const dL=new THREE.DirectionalLight('#58F2FF',0.3);dL.position.set(2,4,3);S.add(dL);
const cL=new THREE.PointLight('#00D4FF',12,25,2);cL.position.set(0,1.5,3.5);S.add(cL);
addAt(S, new THREE.PointLight('#00D4FF',5,15,2), 0,-.5,.8);
addAt(S, new THREE.PointLight('#2a2a5a',6,20,2), -5,2,-3);
addAt(S, new THREE.PointLight('#2a2a5a',5,20,2), 5,2,-3);
const rL=new THREE.PointLight('#FF5D9E',0,10,2);rL.position.set(0,.5,2);S.add(rL);

/* ╔═══════════════════════════════════════════════════════╗
   ║  SECTION 5 — MONITOR OVERLAY TRACKING                 ║
   ╚═══════════════════════════════════════════════════════╝ */
const monOverlay = document.getElementById('monitor-overlay');
// Monitor screen plane corners in local space (PlaneGeometry 3.7 x 2.4 at z=0.235)
const screenCorners = [
  new THREE.Vector3(-1.85, 1.2, 0.24),
  new THREE.Vector3(1.85, 1.2, 0.24),
  new THREE.Vector3(-1.85, -1.2, 0.24),
  new THREE.Vector3(1.85, -1.2, 0.24),
];
const projected = new THREE.Vector3();

function updateMonitorOverlay() {
  if (cur !== STATES.PLAY) { monOverlay.classList.remove('visible'); return; }
  monOverlay.classList.add('visible');
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  screenCorners.forEach(corner => {
    projected.copy(corner);
    mGrp.localToWorld(projected);
    projected.project(cam);
    const sx = (projected.x * 0.5 + 0.5) * innerWidth;
    const sy = (-projected.y * 0.5 + 0.5) * innerHeight;
    minX = Math.min(minX, sx); maxX = Math.max(maxX, sx);
    minY = Math.min(minY, sy); maxY = Math.max(maxY, sy);
  });
  const pad = 4;
  monOverlay.style.left = (minX - pad) + 'px';
  monOverlay.style.top = (minY - pad) + 'px';
  monOverlay.style.width = (maxX - minX + pad * 2) + 'px';
  monOverlay.style.height = (maxY - minY + pad * 2) + 'px';
}

/* ╔═══════════════════════════════════════════════════════╗
   ║  SECTION 6 — INPUT & STATE MACHINE                    ║
   ╚═══════════════════════════════════════════════════════╝ */
const ray = new THREE.Raycaster(), ptr = new THREE.Vector2();

function onMove(e){mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;ptr.set(mouse.x,mouse.y);const g=document.getElementById('cursor-glow');g.style.left=e.clientX+'px';g.style.top=e.clientY+'px'}
function checkHover(){ray.setFromCamera(ptr,cam);const h=ray.intersectObjects(mGrp.children,true);const was=hovered;hovered=h.length>0;if(hovered&&!was&&cur===STATES.IDLE)setState(STATES.INVITE);else if(!hovered&&was&&cur===STATES.INVITE)setState(STATES.IDLE);document.body.style.cursor=hovered?'pointer':'default'}

function onDown(e){
  const cx=e.clientX??(e.touches?.[0]?.clientX)??0;
  const cy=e.clientY??(e.touches?.[0]?.clientY)??0;
  ptr.set((cx/innerWidth)*2-1,-(cy/innerHeight)*2+1);
  ray.setFromCamera(ptr,cam);
  const hits=ray.intersectObjects(mGrp.children,true);
  const onMon=hits.length>0;

  if(onMon&&(cur===STATES.IDLE||cur===STATES.INVITE)&&!zoomActive){
    zoomActive=true;
    setState(STATES.ZOOM);
    setTimeout(()=>setState(STATES.BOOT),700);
    setTimeout(()=>{setState(STATES.PLAY);zoomActive=false},2800);
  } else if(!onMon&&cur===STATES.PLAY&&!zoomActive){
    // Check if click is inside the overlay UI
    const ovr=monOverlay.getBoundingClientRect();
    if(cx<ovr.left||cx>ovr.right||cy<ovr.top||cy>ovr.bottom){
      closeAllPlayers();
      setState(STATES.EXIT);
      setTimeout(()=>setState(STATES.IDLE),1400);
    }
  } else if(cur===STATES.EXIT)setState(STATES.IDLE);
}

addEventListener('pointermove',onMove);
addEventListener('pointerdown',onDown);
addEventListener('touchstart',(e)=>{if(e.touches.length){const t=e.touches[0];mouse.x=(t.clientX/innerWidth)*2-1;mouse.y=-(t.clientY/innerHeight)*2+1;ptr.set(mouse.x,mouse.y);onDown(t)}},{passive:true});

function setState(s){
  cur=s;const c=CAM[s];tPos.set(...c.pos);tTgt.set(...c.tgt);tFov=c.fov;
  document.getElementById('state-label').textContent=s;
  const scan=document.getElementById('scanlines');
  switch(s){
    case STATES.IDLE:emI=.9;noiseO=0;scan.style.opacity='0';rL.intensity=0;bloom.strength=.65;cP.uniforms.uI.value=.0012;
      monOverlay.classList.remove('visible');break;
    case STATES.INVITE:emI=1;bloom.strength=.8;break;
    case STATES.ZOOM:emI=1;bloom.strength=1;cP.uniforms.uI.value=.004;break;
    case STATES.BOOT:emI=.1;noiseO=.8;scan.style.opacity='1';rL.intensity=4;bloom.strength=.4;cP.uniforms.uI.value=.008;bootProg=0;break;
    case STATES.PLAY:emI=.6;noiseO=0;scan.style.opacity='.1';rL.intensity=.3;bloom.strength=.5;cP.uniforms.uI.value=.001;
      showScreen('menu-screen');break;
    case STATES.EXIT:emI=.9;noiseO=0;scan.style.opacity='0';rL.intensity=0;bloom.strength=.6;cP.uniforms.uI.value=.0012;
      monOverlay.classList.remove('visible');break;
  }
}

/* ╔═══════════════════════════════════════════════════════╗
   ║  SECTION 7 — MAIN ANIMATION LOOP                      ║
   ╚═══════════════════════════════════════════════════════╝ */
function lerp(a,b,t){return a+(b-a)*t}
function animate(){
  requestAnimationFrame(animate);
  const dt=clk.getDelta(),el=clk.getElapsedTime(),t=Math.min(dt*3,1);
  cam.position.lerp(tPos,t);camTgt.lerp(tTgt,t);cam.lookAt(camTgt);
  cam.fov=lerp(cam.fov,tFov,t);cam.updateProjectionMatrix();
  if(cur===STATES.IDLE||cur===STATES.INVITE){cam.position.x+=mouse.x*.12*dt*10;cam.position.y+=mouse.y*.06*dt*10}
  scrMat.uniforms.uT.value=el;
  scrMat.uniforms.uI.value=lerp(scrMat.uniforms.uI.value,emI,t);
  scrMat.uniforms.uN.value=lerp(scrMat.uniforms.uN.value,noiseO,t);
  scrMat.uniforms.uB.value=lerp(scrMat.uniforms.uB.value,cur===STATES.BOOT?1:0,t*.5);
  mGrp.rotation.y=lerp(mGrp.rotation.y,cur===STATES.INVITE?.035:0,t*.8);
  const pos=dG.attributes.position.array;
  for(let i=0;i<DC;i++){pos[i*3]+=dV[i*3];pos[i*3+1]+=dV[i*3+1];pos[i*3+2]+=dV[i*3+2];if(pos[i*3+1]>4)pos[i*3+1]=-4;if(Math.abs(pos[i*3])>8)pos[i*3]*=-.95}
  dG.attributes.position.needsUpdate=true;
  cL.intensity=6+2*Math.sin(el*1.5);
  if(cur===STATES.BOOT){bootProg=Math.min(bootProg+dt*.4,1);if(el-lGlitch>.3+Math.random()*.5){lGlitch=el;cP.uniforms.uI.value=.015+Math.random()*.01;setTimeout(()=>{if(cur===STATES.BOOT)cP.uniforms.uI.value=.008},80)}rL.intensity=2+2*Math.sin(el*8)}
  gP.uniforms.uT.value=el;gP.uniforms.uI.value=cur===STATES.BOOT?.12:.04;
  checkHover();
  updateMonitorOverlay();
  comp.render();
}

addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight);comp.setSize(innerWidth,innerHeight);bloom.resolution.set(innerWidth,innerHeight);duM.uniforms.uPR.value=R.getPixelRatio()});
addEventListener('message',(e)=>{if(e.data?.type==='breachroom-set-state'&&CAM[e.data.state])setState(e.data.state)});

setState(STATES.IDLE);
animate();
console.log('%c[BreachRoom] Loaded — click monitor to enter','color:#58F2FF;font-weight:bold');
</script>
</body>
